name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-key
          SUPABASE_SERVICE_ROLE_KEY: test-key
          MOCK_AUTH_ENABLED: true

  security:
    runs-on: ubuntu-latest
    name: Security Audit

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # NPM Audit — fail on high/critical vulnerabilities
      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: false

      # Secret scanning with TruffleHog
      - name: Secret Detection
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      # Dependency review for PRs
      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      # Check for known insecure patterns
      - name: Check for dangerous patterns
        run: |
          echo "Checking for dangerous patterns..."
          # Check for eval / new Function
          if grep -rn "eval\|new Function(" src/ --include="*.ts" --include="*.tsx"; then
            echo "ERROR: Found dangerous eval/new Function usage"
            exit 1
          fi
          # Check for direct supabase-js imports outside infrastructure
          if grep -rn "from ['\"]@supabase/supabase-js['\"]" src/ --include="*.ts" --include="*.tsx" | grep -v "infrastructure/\|lib/supabase/"; then
            echo "ERROR: Found unauthorized @supabase/supabase-js import"
            exit 1
          fi
          # Check for console.log in production code
          if grep -rn "console\.log\|console\.warn\|console\.error\|console\.info" src/ --include="*.ts" --include="*.tsx" | grep -v "\.test\." | grep -v "logger\."; then
            echo "WARNING: Found raw console usage (should use structured logger)"
            # Not failing the build for warnings, just alerting
          fi
          # Check for hardcoded secrets patterns
          if grep -rn "sk-live-\|sk_test-\|password.*=.*['\"][^'\"]\{8,\}['\"]\|api_key.*=.*['\"][^'\"]\{16,\}['\"]" src/ --include="*.ts" --include="*.tsx"; then
            echo "ERROR: Potential hardcoded secret detected"
            exit 1
          fi
          echo "Dangerous pattern check passed"

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_PRODUCTION_AUTH: true
          MOCK_AUTH_ENABLED: false

  # NOTE: Deployment is handled automatically by Vercel's native Git integration.
  # The repo is connected to project: prj_IAsgbmTFkAjM2ldRFEMv2bxYATNB
  # Every push to main auto-deploys to production. Every PR gets a preview URL.
  # See: https://vercel.com/aubreymazinyi-6479s-projects/hr_agent_swarm/git
